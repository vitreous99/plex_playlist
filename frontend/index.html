<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plex Playlist</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --text-color: #f1f1f1;
            --primary: #e5a00d;
            --primary-hover: #ffb822;
            --secondary: #1e2133;
            --secondary-hover: #2a2e46;
            --border: #323652;
            --error: #ff5252;
            --success: #4caf50;
            --glass-bg: rgba(30, 33, 51, 0.7);
            --glow: 0 0 15px rgba(229, 160, 13, 0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(229, 160, 13, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(229, 160, 13, 0.05), transparent 25%);
            color: var(--text-color);
            line-height: 1.6;
        }

        h1, h2, h3 { 
            color: var(--primary);
            text-shadow: 0 2px 10px rgba(229, 160, 13, 0.2);
            margin-top: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .container:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(15, 17, 26, 0.8);
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col { flex: 1; }

        button {
            background: var(--primary);
            color: #0f111a;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(229, 160, 13, 0.2);
        }

        button:hover:not(:disabled) { 
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 160, 13, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }

        button.secondary { 
            background: var(--secondary); 
            color: var(--text-color);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        button.secondary:hover:not(:disabled) {
            background: var(--secondary-hover);
            border-color: #4a4e70;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .status-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: var(--secondary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.ok { 
            color: var(--success); 
            border-color: rgba(76, 175, 80, 0.3);
            background: rgba(76, 175, 80, 0.1);
        }
        
        .status-badge.error { 
            color: var(--error);
            border-color: rgba(255, 82, 82, 0.3);
            background: rgba(255, 82, 82, 0.1);
        }

        .track-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .track-item {
            padding: 16px 20px;
            background: rgba(30, 33, 51, 0.4);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
        }

        .track-item:hover {
            background: rgba(30, 33, 51, 0.8);
        }

        .track-item:last-child { border-bottom: none; }
        
        .track-title { 
            font-weight: 600; 
            font-size: 1.1em; 
            color: var(--text-color);
            margin-bottom: 4px;
        }
        
        .track-artist { 
            color: var(--primary); 
            font-size: 0.95em;
            font-weight: 500;
        }
        
        .track-reasoning { 
            font-size: 0.9em; 
            color: #8892b0; 
            margin-top: 8px; 
            font-style: italic; 
            line-height: 1.4;
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .hidden { display: none !important; }

        #loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
            font-size: 1.2em;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(229, 160, 13, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        .toast.show { 
            opacity: 1; 
            transform: translateY(0);
        }
        
        .toast.success { 
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .toast.error { 
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border); 
            border-radius: 4px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: #4a4e70; }

        @media (max-width: 600px) {
            .row { flex-direction: column; gap: 16px; }
            .header { flex-direction: column; gap: 20px; align-items: flex-start; }
            .status-panel { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
            Plex Playlist
        </h1>
        <div class="status-panel">
            <span id="sync-status" class="status-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Checking...
            </span>
            <button id="btn-sync" class="secondary" style="padding: 6px 12px; font-size: 14px;">Sync Library</button>
        </div>
    </div>

    <div class="container">
        <h2>Generate Playlist</h2>
        <div class="input-group">
            <label for="prompt">What kind of music do you want to hear?</label>
            <input type="text" id="prompt" placeholder="e.g., upbeat 90s rock for a workout" autocomplete="off">
        </div>
        <div class="row">
            <div class="col input-group">
                <label for="track-count">Number of Tracks</label>
                <input type="number" id="track-count" value="20" min="1" max="100">
            </div>
            <div class="col input-group">
                <label for="client">Playback Device</label>
                <select id="client">
                    <option value="">Loading devices...</option>
                </select>
            </div>
        </div>
        <button id="btn-generate" style="width: 100%; margin-top: 10px;">
            ✨ Generate Magic Playlist
        </button>
    </div>

    <div id="results-container" class="container hidden">
        <div class="header" style="border:none; margin-bottom: 10px; padding:0;">
            <div>
                <h2 id="playlist-title" style="margin-bottom: 5px;">Generated Playlist</h2>
                <p id="playlist-desc" style="color: #8892b0; margin: 0; font-size: 0.95em;"></p>
            </div>
            <div class="actions">
                <button id="btn-play">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" style="vertical-align: text-bottom; margin-right: 4px;">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg> Play
                </button>
                <button id="btn-save" class="secondary">Save</button>
            </div>
        </div>
        
        <ul id="track-list" class="track-list">
            <!-- Tracks will be inserted here -->
        </ul>
    </div>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <div>Generating your playlist...<br><small style="color: #8892b0; font-weight: normal;">This may take a minute depending on your prompt.</small></div>
    </div>

    <div id="toast" class="toast">Message here</div>

    <script src="app.js"></script>
</body>
</html>
