<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plex Playlist</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --text-color: #f1f1f1;
            --primary: #e5a00d;
            --primary-hover: #ffb822;
            --secondary: #1e2133;
            --secondary-hover: #2a2e46;
            --border: #323652;
            --error: #ff5252;
            --success: #4caf50;
            --glass-bg: rgba(30, 33, 51, 0.7);
            --glow: 0 0 15px rgba(229, 160, 13, 0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(229, 160, 13, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(229, 160, 13, 0.05), transparent 25%);
            color: var(--text-color);
            line-height: 1.6;
        }

        h1, h2, h3 { 
            color: var(--primary);
            text-shadow: 0 2px 10px rgba(229, 160, 13, 0.2);
            margin-top: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .container:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(15, 17, 26, 0.8);
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .row {
            display: flex;
            gap: 20px;
        }

        .col { flex: 1; }

        button {
            background: var(--primary);
            color: #0f111a;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(229, 160, 13, 0.2);
        }

        button:hover:not(:disabled) { 
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 160, 13, 0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }

        button.secondary { 
            background: var(--secondary); 
            color: var(--text-color);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        button.secondary:hover:not(:disabled) {
            background: var(--secondary-hover);
            border-color: #4a4e70;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .status-panel {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: var(--secondary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.ok { 
            color: var(--success); 
            border-color: rgba(76, 175, 80, 0.3);
            background: rgba(76, 175, 80, 0.1);
        }
        
        .status-badge.error { 
            color: var(--error);
            border-color: rgba(255, 82, 82, 0.3);
            background: rgba(255, 82, 82, 0.1);
        }

        .track-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .track-item {
            padding: 16px 20px;
            background: rgba(30, 33, 51, 0.4);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
        }

        .track-item:hover {
            background: rgba(30, 33, 51, 0.8);
        }

        .track-item:last-child { border-bottom: none; }
        
        .track-title { 
            font-weight: 600; 
            font-size: 1.1em; 
            color: var(--text-color);
            margin-bottom: 4px;
        }
        
        .track-artist { 
            color: var(--primary); 
            font-size: 0.95em;
            font-weight: 500;
        }
        
        .track-reasoning { 
            font-size: 0.9em; 
            color: #8892b0; 
            margin-top: 8px; 
            font-style: italic; 
            line-height: 1.4;
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .hidden { display: none !important; }

        /* Activity Feed Styling */
        #activity-feed-container {
            background: rgba(10, 12, 20, 0.95);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            color: #a8b9d0;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        #activity-feed {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .progress-bar-container {
            width: 100%;
            height: 24px;
            background: rgba(50, 54, 82, 0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 100%;
            display: flex;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-segment {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.6);
            position: relative;
            min-width: 40px;
        }

        .progress-segment.prompt { background: linear-gradient(90deg, #e5a00d, #ffb822); }
        .progress-segment.llm { background: linear-gradient(90deg, #6c63ff, #8b7eff); }
        .progress-segment.matching { background: linear-gradient(90deg, #4caf50, #66bb6a); }
        .progress-segment.sonic { background: linear-gradient(90deg, #2196f3, #42a5f5); }

        .feed-line {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 6px 0;
            animation: slideIn 0.4s ease-out;
        }

        .feed-icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            font-size: 12px;
        }

        .feed-icon.phase-marker { color: var(--primary); font-weight: bold; }
        .feed-icon.step { color: #8892b0; }
        .feed-icon.success { color: var(--success); }
        .feed-icon.error { color: var(--error); }
        .feed-icon.track { color: var(--primary); }

        .feed-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .feed-message {
            color: #ccc;
            line-height: 1.4;
        }

        .feed-detail {
            color: #8892b0;
            font-size: 12px;
            margin-left: 28px;
        }

        .feed-timing {
            flex-shrink: 0;
            color: #6b7b93;
            font-size: 12px;
            font-weight: 500;
            min-width: 50px;
            text-align: right;
        }

        .track-card {
            background: rgba(30, 33, 51, 0.6);
            border-left: 3px solid var(--primary);
            padding: 10px 12px;
            margin: 4px 0 4px 28px;
            border-radius: 4px;
            animation: slideIn 0.4s ease-out;
        }

        .track-card.matched {
            border-left-color: var(--success);
        }

        .track-card.unmatched {
            border-left-color: var(--error);
            opacity: 0.7;
        }

        .track-card-title {
            font-weight: 600;
            color: var(--text-color);
            font-size: 13px;
        }

        .track-card-artist {
            color: var(--primary);
            font-size: 12px;
            margin-top: 2px;
        }

        .track-card-match {
            color: #8892b0;
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.8;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(229, 160, 13, 0.1), rgba(107, 99, 255, 0.1));
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            animation: expandIn 0.4s ease-out;
        }

        .summary-title {
            font-weight: bold;
            color: var(--primary);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .summary-stat {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-size: 12px;
        }

        .summary-stat-label {
            color: #8892b0;
        }

        .summary-stat-value {
            color: var(--primary);
            font-weight: 600;
        }

        .summary-steps {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 16px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .summary-step {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(50, 54, 82, 0.3);
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid rgba(229, 160, 13, 0.1);
        }

        .summary-step-label {
            color: #ccc;
            font-weight: 500;
        }

        .summary-step-value {
            color: var(--primary);
            font-weight: 600;
            min-width: 60px;
            text-align: right;
        }

        .timing-breakdown {
            display: flex;
            gap: 4px;
            margin-top: 12px;
            height: 20px;
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            background: rgba(50, 54, 82, 0.3);
        }

        .timing-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.6);
        }

        .timing-segment.prompt { background: linear-gradient(90deg, #e5a00d, #ffb822); }
        .timing-segment.llm { background: linear-gradient(90deg, #6c63ff, #8b7eff); }
        .timing-segment.matching { background: linear-gradient(90deg, #4caf50, #66bb6a); }
        .timing-segment.sonic { background: linear-gradient(90deg, #2196f3, #42a5f5); }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-12px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes expandIn {
            from {
                opacity: 0;
                transform: scaleY(0.95);
                max-height: 0;
            }
            to {
                opacity: 1;
                transform: scaleY(1);
                max-height: 500px;
            }
        }

        #loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
            font-size: 1.2em;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(229, 160, 13, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        
        .toast.show { 
            opacity: 1; 
            transform: translateY(0);
        }
        
        .toast.success { 
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .toast.error { 
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border); 
            border-radius: 4px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: #4a4e70; }

        @media (max-width: 600px) {
            .row { flex-direction: column; gap: 16px; }
            .header { flex-direction: column; gap: 20px; align-items: flex-start; }
            .status-panel { width: 100%; justify-content: space-between; }
            #activity-feed-container { padding: 12px; font-size: 12px; }
        }

        /* Phase Section Styling (Details/Summary) */
        .phase-section {
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(50, 54, 82, 0.2);
            overflow: hidden;
        }

        .phase-section > summary {
            cursor: pointer;
            padding: 12px 16px;
            background: rgba(50, 54, 82, 0.5);
            user-select: none;
            font-weight: 600;
            color: #ccc;
            transition: background 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .phase-section > summary:hover {
            background: rgba(50, 54, 82, 0.8);
        }

        .phase-section[open] > summary {
            background: rgba(70, 74, 102, 0.7);
            border-bottom: 1px solid var(--border);
        }

        .phase-section > summary::marker {
            color: var(--primary);
        }

        .phase-feed {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            color: #a8b9d0;
        }

        .phase-feed .feed-line {
            padding: 4px 0;
        }

        /* System Prompt Nested Details */
        .system-prompt-details {
            margin: 8px 0 0 28px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: rgba(15, 17, 26, 0.6);
        }

        .system-prompt-details > summary {
            cursor: pointer;
            padding: 8px 12px;
            font-size: 12px;
            color: #8892b0;
            user-select: none;
            transition: background 0.2s ease;
        }

        .system-prompt-details > summary:hover {
            background: rgba(50, 54, 82, 0.5);
        }

        .system-prompt-details > summary::marker {
            color: #6b7b93;
        }

        .system-prompt-code {
            padding: 12px;
            background: rgba(15, 17, 26, 0.8);
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 11px;
            line-height: 1.4;
            color: #a8b9d0;
            border-top: 1px solid var(--border);
        }

        /* Context Pills */
        .context-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0 0 28px;
        }

        .context-pill {
            display: inline-block;
            background: rgba(229, 160, 13, 0.15);
            border: 1px solid rgba(229, 160, 13, 0.3);
            color: #ffb822;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 500;
        }

        .context-pill.genre {
            background: rgba(76, 175, 80, 0.15);
            border-color: rgba(76, 175, 80, 0.3);
            color: #66bb6a;
        }

        /* Sample Tracks Mini-List */
        .sample-tracks-list {
            margin: 8px 0 0 28px;
            padding: 8px 12px;
            background: rgba(15, 17, 26, 0.6);
            border-left: 2px solid var(--primary);
            border-radius: 4px;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
        }

        .sample-track-item {
            padding: 4px 0;
            color: #a8b9d0;
            line-height: 1.4;
        }

        .sample-track-title {
            color: var(--text-color);
            font-weight: 500;
        }

        .sample-track-artist {
            color: #8892b0;
            font-size: 11px;
        }

        /* Source Badge */
        .track-source-sonic {
            font-size: 0.85em;
            color: #8892b0;
            margin-top: 8px;
            font-style: italic;
            padding-left: 12px;
            border-left: 2px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
            Plex Playlist
        </h1>
        <div class="status-panel">
            <span id="sync-status" class="status-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Checking...
            </span>
            <button id="btn-sync" class="secondary" style="padding: 6px 12px; font-size: 14px;">Sync Library</button>
        </div>
    </div>

    <div class="container">
        <h2>Generate Playlist</h2>
        <div class="input-group">
            <label for="prompt">What kind of music do you want to hear?</label>
            <input type="text" id="prompt" placeholder="e.g., upbeat 90s rock for a workout" autocomplete="off">
        </div>
        <div class="row">
            <div class="col input-group">
                <label for="track-count">Number of Tracks</label>
                <input type="number" id="track-count" value="20" min="1" max="100">
            </div>
            <div class="col input-group">
                <label for="client">Playback Device</label>
                <select id="client">
                    <option value="">Loading devices...</option>
                </select>
            </div>
            <div class="col input-group" style="display: flex; flex-direction: column; justify-content: flex-end;">
                <button id="btn-wake" class="secondary" style="padding: 6px 12px; font-size: 14px; width: 100%;">⚡ Wake Shield</button>
            </div>
        </div>
        <button id="btn-generate" style="width: 100%; margin-top: 10px;">
            ✨ Generate Magic Playlist
        </button>
        <div id="action-buttons" class="actions" style="margin-top: 16px; gap: 12px; display: none;">
            <button id="btn-play-top" style="flex: 1;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" style="vertical-align: text-bottom; margin-right: 4px;">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg> Play
            </button>
            <button id="btn-save-top" class="secondary" style="flex: 1;">Save</button>
        </div>
    </div>

    <div id="activity-feed-container" class="container hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 style="margin: 0;">🔍 Generation Details</h2>
            <button id="cp-toggle" class="secondary" style="padding: 6px 12px; font-size: 14px;">Hide Details</button>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div id="cp-body">
            <details id="phase-prompt" class="phase-section" open>
                <summary class="phase-summary">🎯 Prompt Processing</summary>
                <div class="phase-feed"></div>
            </details>
            <details id="phase-llm" class="phase-section" open>
                <summary class="phase-summary">🤖 LLM Generation</summary>
                <div class="phase-feed"></div>
            </details>
            <details id="phase-matching" class="phase-section" open>
                <summary class="phase-summary">🔍 Plex Matching</summary>
                <div class="phase-feed"></div>
            </details>
            <details id="phase-sonic" class="phase-section" open>
                <summary class="phase-summary">🎵 Sonic Expansion</summary>
                <div class="phase-feed"></div>
            </details>
            <div id="phase-timing" style="margin-top: 16px;"></div>
        </div>
    </div>

    <div id="results-container" class="container hidden">
        <div>
            <h2 id="playlist-title" style="margin-bottom: 5px;">Generated Playlist</h2>
            <p id="playlist-desc" style="color: #8892b0; margin: 0 0 20px 0; font-size: 0.95em;"></p>
        </div>
        
        <ul id="track-list" class="track-list">
            <!-- Tracks will be inserted here -->
        </ul>
    </div>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <div>Generating your playlist...<br><small style="color: #8892b0; font-weight: normal;">This may take a minute depending on your prompt.</small></div>
    </div>

    <div id="toast" class="toast">Message here</div>

    <script src="app.js"></script>
</body>
</html>
