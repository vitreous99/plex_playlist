# =============================================================================
# Plex Playlist — Docker Compose Orchestration
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plex-playlist-app
    ports:
      - "8033:8000"
    env_file:
      - .env
    volumes:
      - ./db:/app/db
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Static file server (nginx)
  # ---------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: plex-playlist-frontend
    ports:
      - "3033:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - app
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ADB Bridge — Android Debug Bridge orchestration service
  # ---------------------------------------------------------------------------
  adb-bridge:
    build:
      context: ./adb-bridge
      dockerfile: Dockerfile
    container_name: plex-playlist-adb-bridge
    env_file:
      - .env
    volumes:
      - ./adb-keys:/root/.android
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Tailscale — Private tailnet access via Serve
  # ---------------------------------------------------------------------------
  # Start with: `docker compose --profile tailscale up -d`
  # Requires TS_AUTHKEY in .env and tailscale-config/serve.json configured
  #
  # This sidecar runs Tailscale Serve to expose the FastAPI backend
  # via HTTPS on your Tailscale network at plex-playlist.tailXXXX.ts.net
  tailscale:
    image: tailscale/tailscale:latest
    container_name: plex-playlist-tailscale
    network_mode: service:frontend
    env_file:
      - .env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_HOSTNAME=plex-playlist
    volumes:
      - tailscale-state:/var/lib/tailscale
      # Config directory (read-only) for Serve configuration
      - ${PWD}/tailscale-config:/config:ro
      # Startup helper script (waits for app to be reachable before starting tailscaled)
      - ${PWD}/scripts/tailscale-wait-and-run.sh:/usr/local/bin/tailscale-wait-and-run.sh:ro
    depends_on:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Wait for app to be reachable before launching tailscaled
    # to avoid Serve race conditions
    command: ["sh", "/usr/local/bin/tailscale-wait-and-run.sh"]
    profiles:
      - tailscale

networks:
  internal:
    driver: bridge

volumes:
  tailscale-state:
    driver: local
