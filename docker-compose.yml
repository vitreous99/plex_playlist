# =============================================================================
# Plex Playlist — Docker Compose Orchestration
# =============================================================================

services:
  ts-plex:
      image: tailscale/tailscale:latest
      container_name: plex-playlist-tailscale
      hostname: plex-playlist
      environment:
        - TS_AUTHKEY=tskey-auth-kLzY5nugK321CNTRL-1W7NkoHFjKiF1YH4c8QjKi2qZRJkvQjQ
        - TS_STATE_DIR=/var/lib/tailscale
        - TS_SERVE_CONFIG=/config/serve.json # Add this if you use 'tailscale serve'
      volumes:
        - ./ts_state:/var/lib/tailscale
        - ./tailscale-config:/config  # <--- Add this line
        - /dev/net/tun:/dev/net/tun
      networks:
        - internal  # <--- CRITICAL: Add this line
      cap_add:
        - NET_ADMIN
        - SYS_MODULE
      restart: unless-stopped  
  # ---------------------------------------------------------------------------
  # Backend — FastAPI application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plex-playlist-app
    ports:
      - "8033:8000"
    env_file:
      - .env
    volumes:
      - ./db:/app/db
    networks:
      - internal
      - nyx_protocol_nyx-net # <--- Add the Nyx network here
    extra_hosts:
      - "host.docker.internal:host-gateway" # <--- Add this!
    
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — Static file server (nginx)
  # ---------------------------------------------------------------------------
  frontend:
    image: nginx:alpine
    container_name: plex-playlist-frontend
    ports:
      - "3033:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - app
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ADB Bridge — Android Debug Bridge orchestration service
  # ---------------------------------------------------------------------------
  adb-bridge:
    build:
      context: ./adb-bridge
      dockerfile: Dockerfile
    container_name: plex-playlist-adb-bridge
    env_file:
      - .env
    volumes:
      - ./adb-keys:/root/.android
    extra_hosts:
      - "host.docker.internal:host-gateway" # <--- Add this!
      
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  nyx_protocol_nyx-net:
      external: true  # This tells Docker "Don't create this, look for it."
volumes:
  tailscale-state:
