services:
  ts-plex:
    image: tailscale/tailscale:latest
    container_name: plex-playlist-tailscale
    hostname: plex-playlist
    environment:
      - TS_AUTHKEY=tskey-auth-kLzY5nugK321CNTRL-1W7NkoHFjKiF1YH4c8QjKi2qZRJkvQjQ
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ./ts_state:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    networks:
      - internal
      - nyx_protocol_nyx-net  
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped  

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plex-playlist-app
    # CHANGED: Put the app directly on the host network so it can reach Plex at 127.0.0.1
    network_mode: "host" 
    # REMOVED: depends_on: ts-plex (no longer relying on it for networking)
    env_file:
      - .env
    volumes:
      - ./db:/app/db
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: plex-playlist-frontend
    ports:
      - "3033:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    extra_hosts:
      # ADDED: This allows Nginx to bridge out and talk to your host-mode app
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  adb-bridge:
    build:
      context: ./adb-bridge
      dockerfile: Dockerfile
    container_name: plex-playlist-adb-bridge
    ports:
      # Bind to localhost only so the host-mode app can reach adb-bridge at
      # 127.0.0.1:9000 without exposing it to external networks.
      - "127.0.0.1:9001:9000"
    env_file:
      - .env
    volumes:
      - ./adb-keys:/root/.android
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

networks:
  internal:
    driver: bridge
  nyx_protocol_nyx-net:
    external: true